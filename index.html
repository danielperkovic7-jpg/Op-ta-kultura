<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvizovi znanja</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --card: #21253a;
            --border: #2e3350;
            --accent: #6c63ff;
            --accent2: #f7c948;
            --text: #e8eaf0;
            --muted: #7b82a0;
            --correct: #2ecc71;
            --incorrect: #e74c3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
        }

        /* ── MENU ── */
        #menu {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 40px;
        }

        .hero-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 5px 16px;
            margin-bottom: 28px;
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.2rem, 6vw, 3.8rem);
            font-weight: 700;
            text-align: center;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .hero-title span {
            color: var(--accent2);
        }

        .hero-sub {
            color: var(--muted);
            font-size: 1rem;
            text-align: center;
            margin-bottom: 56px;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .quiz-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .quiz-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-accent, var(--accent));
            border-radius: 16px 16px 0 0;
        }

        .quiz-card:hover {
            transform: translateY(-4px);
            border-color: var(--card-accent, var(--accent));
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 14px;
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .card-meta {
            font-size: 0.78rem;
            color: var(--muted);
            display: flex;
            gap: 12px;
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .start-btn {
            margin-top: 18px;
            width: 100%;
            padding: 11px;
            background: var(--card-accent, var(--accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: opacity 0.15s;
        }
        .start-btn:hover { opacity: 0.85; }

        /* ── QUIZ ── */
        #quiz-view {
            display: none;
            min-height: 100vh;
            padding: 24px 16px 48px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .quiz-header {
            width: 100%;
            max-width: 640px;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .back-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            transition: color 0.15s;
            white-space: nowrap;
        }
        .back-btn:hover { color: var(--text); }

        .progress-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .progress-label {
            font-size: 0.78rem;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 5px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .quiz-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            width: 100%;
            max-width: 640px;
        }

        .q-category {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 14px;
        }

        .q-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 24px;
            color: var(--text);
        }

        .opt {
            background: var(--card);
            border: 1.5px solid var(--border);
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: border-color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .opt-letter {
            width: 28px; height: 28px;
            border-radius: 6px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        .opt:hover:not(.locked) {
            border-color: var(--accent);
        }
        .opt:hover:not(.locked) .opt-letter {
            background: var(--accent);
        }

        .opt.correct {
            border-color: var(--correct);
            background: rgba(46,204,113,0.08);
        }
        .opt.correct .opt-letter { background: var(--correct); color: white; }

        .opt.incorrect {
            border-color: var(--incorrect);
            background: rgba(231,76,60,0.08);
        }
        .opt.incorrect .opt-letter { background: var(--incorrect); color: white; }

        .next-btn {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .next-btn:disabled { opacity: 0.3; cursor: default; }
        .next-btn:not(:disabled):hover { opacity: 0.85; }

        /* ── RESULT ── */
        #result-view {
            display: none;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px 20px;
            text-align: center;
        }

        .result-score {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 700;
            color: var(--accent2);
            line-height: 1;
            margin-bottom: 8px;
        }

        .result-label {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .result-msg {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
        }

        .result-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary, .btn-secondary {
            padding: 13px 28px;
            border-radius: 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity 0.15s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-primary:hover, .btn-secondary:hover { opacity: 0.8; }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menu">
    <div class="hero-badge">📚 Kvizovi znanja</div>
    <h1 class="hero-title">Testiraj <span>svoje znanje</span></h1>
    <p class="hero-sub">Izaberi kviz i kreći</p>

    <div class="quiz-grid" id="grid"></div>
</div>

<!-- QUIZ -->
<div id="quiz-view">
    <div class="quiz-header">
        <button class="back-btn" onclick="goMenu()">← Meni</button>

            </div>
            <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
        </div>
    </div>
    <div class="quiz-box">
        <div class="q-category" id="q-cat"></div>
        <div class="q-text" id="q-text"></div>
        <div id="q-opts"></div>
        <button class="next-btn" id="next-btn" disabled>Sledeće pitanje →</button>
    </div>
</div>

<!-- RESULT -->
<div id="result-view">
    <div class="result-score" id="res-score"></div>
    <div class="result-label" id="res-label"></div>
    <div class="result-msg" id="res-msg"></div>
    <div class="result-btns">
        <button class="btn-primary" id="res-retry">Ponovi kviz</button>
        <button class="btn-secondary" onclick="goMenu()">← Svi kvizovi</button>
    </div>
</div>

const LETTERS = ['A','B','C','D'];

let activeQuiz = null;
let questions = [];
let cur = 0, score = 0, answered = false;

// Build menu cards
const grid = document.getElementById('grid');
QUIZZES.forEach(q => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.style.setProperty('--card-accent', q.color);
    card.innerHTML = `
        <div class="card-icon">${q.icon}</div>
        <div class="card-title">${q.title}</div>
        <div class="card-desc">${q.desc}</div>
        <div class="card-meta">
            <span>📝 ${q.questions.length} pitanja</span>
        </div>
        <button class="start-btn" style="background:${q.color}">Pokreni kviz →</button>
    `;
    card.querySelector('.start-btn').onclick = () => startQuiz(q.id);
    grid.appendChild(card);
});

function startQuiz(id) {
    activeQuiz = QUIZZES[id];
    questions = [...activeQuiz.questions].sort(() => Math.random() - 0.5);
    cur = 0; score = 0; answered = false;
    document.getElementById('menu').style.display = 'none';
    document.getElementById('result-view').style.display = 'none';
    const qv = document.getElementById('quiz-view');
    qv.style.display = 'flex';
    document.getElementById('prog-fill').style.background = activeQuiz.color;
    loadQuestion();
}

function loadQuestion() {
    answered = false;
    document.getElementById('next-btn').disabled = true;
    const q = questions[cur];
    document.getElementById('q-cat').innerText = q.category || activeQuiz.title;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('prog-text').innerText = `Pitanje ${cur + 1} / ${questions.length}`;
    document.getElementById('prog-score').innerText = `${score} tačnih`;
    document.getElementById('prog-fill').style.width = `${(cur / questions.length) * 100}%`;

    const opts = document.getElementById('q-opts');
    opts.innerHTML = '';
    q.options.forEach((txt, i) => {
        const d = document.createElement('div');
        d.className = 'opt';
        d.innerHTML = `<div class="opt-letter">${LETTERS[i]}</div><span>${txt}</span>`;
        d.onclick = () => {
            if (answered) return;
            answered = true;
            opts.querySelectorAll('.opt').forEach(o => o.classList.add('locked'));
            if (i === q.answer) { d.classList.add('correct'); score++; }
            else { d.classList.add('incorrect'); opts.children[q.answer].classList.add('correct'); }
            document.getElementById('prog-score').innerText = `${score} tačnih`;
            document.getElementById('next-btn').disabled = false;
        };
        opts.appendChild(d);
    });
}

document.getElementById('next-btn').onclick = () => {
    cur++;
    if (cur < questions.length) loadQuestion();
    else showResult();
};

function showResult() {
    document.getElementById('quiz-view').style.display = 'none';
    const rv = document.getElementById('result-view');
    rv.style.display = 'flex';
    const pct = Math.round((score / questions.length) * 100);
    document.getElementById('res-score').innerText = `${score}/${questions.length}`;
    document.getElementById('res-label').innerText = `${pct}% tačnih odgovora`;
    let msg = pct >= 80 ? '🏆 Odlično!' : pct >= 60 ? '👍 Dobro urađeno!' : pct >= 40 ? '📚 Ima prostora za napredak' : '💪 Pokušaj ponovo!';
    document.getElementById('res-msg').innerText = msg;
    document.getElementById('res-retry').onclick = () => startQuiz(activeQuiz.id);
}

function goMenu() {
    document.getElementById('quiz-view').style.display = 'none';
    document.getElementById('result-view').style.display = 'none';
    document.getElementById('menu').style.display = 'flex';
}
</script>
